<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioMaroc - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="login-page">
  <div class="login-box">
    <h1>BioMaroc</h1>
    <p class="login-subtitle">Connexion administrateur</p>

    <label>Nom d'utilisateur</label>
    <input type="text" id="username" placeholder="admin">

    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="Mot de passe">

    <button type="button" class="btn" onclick="togglePassword()">Afficher / Masquer</button>
    <button class="btn login-btn" onclick="loginAdmin()">Se connecter</button>

    <hr>

    <button type="button" class="btn login-btn" onclick="toggleChangePassword()">
      Changer le mot de passe
    </button>

    <div id="change-password-box" class="change-box">
      <label>Ancien mot de passe</label>
      <input type="password" id="old-password">

      <label>Nouveau mot de passe</label>
      <input type="password" id="new-password">

      <button class="btn login-btn" onclick="changePassword()">Valider</button>
    </div>

    <p class="login-note">Username: admin | Password par défaut: 1234</p>
  </div>
</section>

<script src="assets/app.js"></script>

</body>
</html>
