<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BioMaroc - Dashboard</title><link rel="stylesheet" href="style.css"></head>
<body>
<header class="topbar"><div class="container nav"><div class="logo">BioMaroc Dashboard</div><nav><a href="index.html">Voir le site</a><a href="login.html" onclick="logoutAdmin()">Déconnexion</a></nav></div></header>
<section class="dashboard container">
  <div class="section-head"><p class="mini">Administration</p><h2>Tableau de bord</h2></div>
  <div class="dashboard-grid">
    <div class="dashboard-card">
      <h3>Insertion de nouveaux produits</h3>
      <p class="dashboard-note">Cette partie ajoute les produits via le dashboard dans le navigateur.</p>
      <label>Nom du produit</label><input id="new-name" type="text" placeholder="Ex: Savon noir">
      <label>Description</label><textarea id="new-desc" placeholder="Description du produit"></textarea>
      <label>Prix</label><input id="new-price" type="number" placeholder="Ex: 15">
      <label>Image</label><input id="new-image" type="text" placeholder="assets/images/figue.svg">
      <button class="btn" onclick="addDashboardProduct()">Ajouter produit</button>
    </div>
    <div class="dashboard-card">
      <h3>Produits ajoutés via Dashboard</h3>
      <div id="dashboard-products"></div>
    </div>
  </div>
</section>
<script src="assets/app.js"></script>
<script>requireAdmin(); renderDashboardProducts();</script>
</body>
</html>
